name: Deploy the fucking react app to beanstalk

on:
  push:
    branches:
      - base-ui  

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      APPLICATION_NAME: "Click to pic"
      ENVIRONMENT_NAME: "Clicktopic-env"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Clean node_modules and test artifacts
        run: |
          rm -rf node_modules
          rm -rf coverage

      - name: Create deployment package
        run: zip -r deploy.zip . -x '*.git*' '*/node_modules/*'

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.APPLICATION_NAME }}
          environment_name: ${{ env.ENVIRONMENT_NAME }}
          region: ${{ env.AWS_REGION }}
          version_label: deploy-${{ github.sha }}
          deployment_package: deploy.zip
